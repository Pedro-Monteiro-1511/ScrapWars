services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: scrapwars-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  bot-worker:
    build:
      context: .
      dockerfile: ScrapWars.Worker/Dockerfile
    container_name: scrapwars-bot-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      ConnectionStrings__Supabase: ${SUPABASE_CONNECTION_STRING}
      Discord__Token: ${DISCORD_BOT_TOKEN}
      Discord__GuildId: ${DISCORD_GUILD_ID}

  scraper-worker:
    build:
      context: .
      dockerfile: ScrapWars.Scraper.Worker/Dockerfile
    container_name: scrapwars-scraper-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /

  price-analysis-worker:
    build:
      context: .
      dockerfile: ScrapWars.PriceAnalysis.Worker/Dockerfile
    container_name: scrapwars-price-analysis-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      ConnectionStrings__Supabase: ${SUPABASE_CONNECTION_STRING}

  notifications-worker:
    build:
      context: .
      dockerfile: ScrapWars.Notifications.Worker/Dockerfile
    container_name: scrapwars-notifications-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      ConnectionStrings__Supabase: ${SUPABASE_CONNECTION_STRING}
      Discord__Token: ${DISCORD_BOT_TOKEN}

volumes:
  rabbitmq-data:
